<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pemuda Wonogiri | Kas Pro</title>
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white font-['Plus_Jakarta_Sans'] overflow-hidden">

    <!-- INTRO SPLASH WITH DOOR ANIMATION -->
    <div id="introContainer" class="fixed inset-0 z-[100] flex">
        <!-- Door Left -->
        <div id="doorLeft" class="w-1/2 h-full bg-[#050505] border-r border-white/5 flex items-center justify-end transition-all duration-[1200ms] ease-in-out">
            <div class="translate-x-1/2 flex flex-col items-center pointer-events-none">
                <div class="mb-6 p-8 bg-[#facc15] rounded-full shadow-[0_0_50px_rgba(250,204,21,0.3)]">
                    <i data-lucide="notebook-tabs" size="50" class="text-black"></i>
                </div>
                <h1 class="text-3xl font-[900] tracking-tighter uppercase whitespace-nowrap mb-2">Ahlan wa Sahlan Akhy</h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mb-8">Buku catatan kas online kita</p>
                <button id="entryBtn" class="pointer-events-auto bg-[#facc15] text-black px-10 py-3.5 rounded-2xl font-[900] text-xs shadow-xl active:scale-90 transition-all uppercase tracking-widest">
                    Klik Disini
                </button>
            </div>
        </div>
        <!-- Door Right -->
        <div id="doorRight" class="w-1/2 h-full bg-[#050505] border-l border-white/5 transition-all duration-[1200ms] ease-in-out"></div>
    </div>

    <!-- MAIN APP CONTENT -->
    <div id="appWrapper" class="h-screen overflow-y-auto hidden opacity-0 transition-opacity duration-1000">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-[#050505]/90 backdrop-blur-xl border-b border-white/5 px-6 py-5">
            <div class="max-w-xl mx-auto flex items-center justify-between">
                <div class="bg-[#facc15] px-3 py-1.5 rounded-xl">
                    <select id="monthSelector" class="bg-transparent text-black text-sm font-black outline-none border-none"></select>
                </div>
                <div class="flex gap-2">
                    <button id="pdfBtn" class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center border border-white/10 text-[#facc15] active:scale-90 transition-all shadow-sm">
                        <i data-lucide="file-text" size="24"></i>
                    </button>
                    <button id="adminBtn" class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center border border-white/10 active:scale-90 transition-all shadow-sm">
                        <i data-lucide="shield-check" size="24"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-xl mx-auto px-6 py-8 space-y-8 pb-32">
            <!-- TOTAL BALANCE (ANGKA JUMBO) -->
            <section class="bg-[#facc15] p-10 rounded-[3.5rem] text-black shadow-2xl relative overflow-hidden">
                <p class="font-black text-[10px] uppercase tracking-[0.4em] opacity-40 mb-2">Total Saldo Kas</p>
                <h2 id="totalSaldo" class="text-6xl font-[900] tracking-tighter leading-none mb-6">Rp 0</h2>
                <div class="w-full h-3 bg-black/10 rounded-full overflow-hidden border border-black/5">
                    <div id="progressBar" class="h-full bg-black transition-all duration-1000"></div>
                </div>
                <div class="flex justify-between mt-3 text-[10px] font-black uppercase tracking-widest">
                    <span>Target Bulan Ini</span>
                    <span id="progressText">0%</span>
                </div>
                <i data-lucide="wallet" class="absolute -right-6 -bottom-6 w-32 h-32 opacity-5"></i>
            </section>

            <!-- MINI STATS (PEMASUKAN & PENGELUARAN DIATAS) -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#111] p-6 rounded-[2.5rem] border border-white/5">
                    <p class="text-[9px] font-black text-[#facc15] uppercase tracking-[0.2em] mb-2 italic">Masuk Bulan Ini</p>
                    <h3 id="totalPemasukan" class="text-xl font-[900] tracking-tight">Rp 0</h3>
                </div>
                <div class="bg-[#111] p-6 rounded-[2.5rem] border border-white/5">
                    <p class="text-[9px] font-black text-rose-500 uppercase tracking-[0.2em] mb-2 italic">Total Keluar</p>
                    <h3 id="totalPengeluaran" class="text-xl font-[900] tracking-tight text-white">Rp 0</h3>
                </div>
            </div>

            <!-- MEMBER LIST (NAMA BESAR & BOLD) -->
            <section class="space-y-5">
                <div class="flex items-center justify-between px-2">
                    <h3 class="text-xs font-black uppercase tracking-[0.4em] text-slate-600">Anggota 🤙🏻</h3>
                    <span id="currentDateDisplay" class="text-[10px] font-bold text-slate-700 uppercase"></span>
                </div>
                <div id="memberList" class="space-y-3">
                    <!-- JS Content -->
                </div>
            </section>

            <!-- LOG PENGELUARAN -->
            <section class="space-y-5">
                <div class="flex items-center justify-between px-4">
                    <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-700">Histori Keluar</h4>
                    <button id="addExpBtn" class="admin-only hidden w-10 h-10 bg-[#facc15] rounded-xl text-black flex items-center justify-center shadow-lg active:scale-90 transition-all"><i data-lucide="plus" size="24"></i></button>
                </div>
                <div id="expenseLog" class="space-y-3"></div>
            </section>
        </main>

        <footer class="py-16 text-center border-t border-white/5 mx-6">
            <a href="https://wa.me/6281286467275" target="_blank" class="text-[10px] font-black tracking-[0.5em] text-slate-800 hover:text-[#facc15] transition-all italic">CREATED BY AIDESIGN</a>
        </footer>
    </div>

    <!-- ADMIN MODAL -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/98 backdrop-blur-3xl z-[200] hidden items-center justify-center p-6">
        <div class="bg-[#111] border border-white/10 w-full max-w-sm rounded-[3.5rem] p-10 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-black mb-8 text-[#facc15] text-center uppercase italic">Form Admin</h3>
            <div id="modalBody" class="space-y-5"></div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal()" class="flex-1 py-4 font-black text-slate-600 uppercase text-xs">Batal</button>
                <button id="modalConfirm" class="flex-1 py-4 bg-[#facc15] text-black font-black rounded-2xl shadow-xl active:scale-95 transition-all uppercase text-[10px] tracking-widest">Simpan</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
